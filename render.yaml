services:
  - type: web
    name: lyaitest-backend
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /data/lyaitest.db
    disk:
      name: lyaitest-data
      mountPath: /data
      sizeGB: 1